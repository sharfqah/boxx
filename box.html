<!DOCTYPE html>
<html>

<head>
    <title>Cookie Shop</title>
    <style>
        body {
            background-color: lemonchiffon;
            font-family: Arial;
            padding: 20px;
        }

        h1 {
            background-color: pink;
            color: white;
            padding: 15px;
            margin: 0 0 20px 0;
        }

        p {
            padding: 10px;
            border: 2px solid palevioletred;
            margin-bottom: 15px;
        }

        .cookie {
            background-color: linen;
            border: 3px solid plum;
            padding: 20px;
            margin: 10px;
            width: 200px;
        }

        .cookie h2 {
            margin: 0 0 10px 0;
            color: purple;
        }

        .cookie p {
            margin: 0;
            border: none;
            padding: 0;
        }
    </style>
</head>

<body>

    <h1>Welcome to the cookie store</h1>

    <p>We sell really good cookies.</p>

    <div class="cookie">
        <h2>Chocolate Chip</h2>
        <p>$2.00</p>
    </div>

    <div class="cookie">
        <h2>Oatmeal Raisin</h2>
        <p>$1.50</p>
    </div>

    <div class="cookie">
        <h2>Sugar Cookie</h2>
        <p>$1.00</p>
    </div>

</body>

</html>
